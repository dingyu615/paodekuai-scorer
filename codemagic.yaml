workflows:
  # ── iOS Build ────────────────────────────────
  ios-build:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: Build debug IPA
        script: flutter build ios --debug && cd build/ios/iphoneos && mkdir -p Payload && cp -R Runner.app Payload/ && zip -r -y debug.ipa Payload
    artifacts:
      - build/ios/iphoneos/debug.ipa

  # ── Android Build ─────────────────────────────
  android-build:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: Flutter build apk
        script: flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
