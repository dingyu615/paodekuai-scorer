workflows:
  # ── iOS Build (免费 Apple ID) ─────────────────
  ios-build:
    name: iOS Build (7天有效)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    code_signing:
      automatic:
        provisioning_profile_type: development
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: Flutter build ipa
        script: flutter build ipa --debug --export-method development
    artifacts:
      - build/ios/ipa/*.ipa

  # ── Android Build ─────────────────────────────
  android-build:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: Flutter build apk
        script: flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
